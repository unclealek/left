<html class="dark" lang="en"><head>

<style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0a10;
            margin: 0;
            overflow: hidden;
        }
        .drift-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50vh;
            overflow: hidden;
            z-index: 0;
        }
        .bubble {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.15;
            animation: drift linear infinite;
        }
        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(var(--x), var(--y)); }
        }
        .aurora-pulse {
            box-shadow: 0 0 20px rgba(78, 207, 179, 0.4);
        }
        .glass-sheet {
            background: rgba(19, 18, 26, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
    </style>

                        "on-primary-fixed-variant": "#3f2bb8",

                        "on-secondary": "#00382e",

<body class="bg-surface-container-lowest text-on-surface antialiased">
<!-- Ambient Background -->
<div class="drift-container" id="drift-bg"></div>
<!-- Main Canvas -->
<main class="relative z-10 flex flex-col min-h-screen max-w-md mx-auto overflow-hidden">
<!-- Top App Bar (Shared Component) -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full bg-surface/80 backdrop-blur-xl fixed top-0 left-0 right-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Café Regatta</span>
</div>
<span class="material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
</header>
<!-- Top Zone: Hero Question -->
<section class="flex-grow flex items-center justify-center pt-24 pb-12">
<h1 class="font-display-sm text-display-sm font-bold text-white tracking-tight">Ready to connect?</h1>
</section>
<!-- Bottom Sheet -->
<div class="glass-sheet rounded-t-[32px] border-t border-outline-variant/30 px-6 pt-3 pb-8 shadow-2xl transition-transform duration-500 ease-out translate-y-0 relative z-20">
<!-- Handle -->
<div class="flex justify-center mb-8">
<div class="w-10 h-1 bg-[#2a2a38] rounded-full"></div>
</div>
<div class="space-y-8">
<!-- Intent Section -->
<div class="space-y-3">
<p class="font-label-md text-label-md text-outline uppercase tracking-widest">I'm here for</p>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full bg-iris text-white font-body-md aurora-pulse transition-all">Networking</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-body-md border border-outline-variant/20 hover:bg-surface-container-highest transition-colors">Open to chat</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-body-md border border-outline-variant/20 hover:bg-surface-container-highest transition-colors">Deep work</button>
</div>
</div>
<!-- Vibe Section -->
<div class="space-y-3">
<p class="font-label-md text-label-md text-outline uppercase tracking-widest">The vibe</p>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full bg-aurora text-[#00382e] font-body-md font-bold transition-all">AI/startups</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-body-md border border-outline-variant/20 hover:bg-surface-container-highest transition-colors">Design</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-body-md border border-outline-variant/20 hover:bg-surface-container-highest transition-colors">Philosophy</button>
</div>
</div>
<!-- Duration Section -->
<div class="space-y-3">
<p class="font-label-md text-label-md text-outline uppercase tracking-widest">Duration</p>
<div class="bg-[#161622] p-1 rounded-xl flex items-center">
<button class="flex-1 py-2 text-center text-on-surface-variant font-label-md">30m</button>
<button class="flex-1 py-2 text-center bg-iris text-white rounded-lg font-label-md shadow-lg shadow-iris/20 transition-all duration-300">1h</button>
<button class="flex-1 py-2 text-center text-on-surface-variant font-label-md">2h</button>
</div>
</div>
<!-- Hint Card (Input field look) -->
<div class="space-y-3">
<p class="font-label-md text-label-md text-outline uppercase tracking-widest">Find me by</p>
<div class="relative">
<input class="w-full bg-[#161622] border-none rounded-xl py-4 px-5 text-on-surface font-body-md focus:ring-1 focus:ring-iris transition-all outline-none" readonly="" type="text" value="Grey hoodie, corner seat"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-iris hover:bg-[#8a7eff] text-white py-5 rounded-xl font-headline-lg-mobile transition-all active:scale-[0.98] shadow-xl shadow-iris/20">
                        Become visible
                    </button>
</div>
</div>
</div>
</main>
<script>
        // Atmospheric Drifting Bubbles
        const bg = document.getElementById('drift-bg');
        const colors = ['#7b6ef6', '#4ecfb3', '#c6c0ff', '#5cdbbe'];
        
        function createBubble() {
            const bubble = document.createElement('div');
            const size = Math.random() * 150 + 100;
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * (window.innerHeight / 2);
            
            bubble.classList.add('bubble');
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            bubble.style.left = `${startX}px`;
            bubble.style.top = `${startY}px`;
            bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            const duration = Math.random() * 20 + 20;
            bubble.style.setProperty('--x', `${(Math.random() - 0.5) * 200}px`);
            bubble.style.setProperty('--y', `${(Math.random() - 0.5) * 200}px`);
            bubble.style.animationDuration = `${duration}s`;
            
            bg.appendChild(bubble);
            
            setTimeout(() => {
                bubble.remove();
                createBubble();
            }, duration * 1000);
        }

        // Initialize bubbles
        for(let i=0; i<8; i++) {
            setTimeout(createBubble, i * 1500);
        }

        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 100);
            });
        });
    </script>
