            0% { transform: translate(0, 0); }
            100% { transform: translate(8px, -10px); }
        }

        .pulse-animation {
            animation: pulse 3s ease-in-out infinite;
        }

            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(123, 110, 246, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(123, 110, 246, 0); }
        }

        .ripple {
            position: absolute;
            border: 1px solid rgba(123, 110, 246, 0.3);
            border-radius: 50%;
            animation: ripple-effect 4s linear infinite;
        }

        @keyframes ripple-effect {
            0% { width: 40px; height: 40px; opacity: 0.8; transform: translate(-50%, -50%) scale(1); }

<script>
    // Subtle mouse/touch interaction for bubbles
    const container = document.getElementById('bubble-container');
    const bubbles = container.querySelectorAll('.drift-animation');

    container.addEventListener('mousemove', (e) => {
        const { clientX, clientY } = e;
        const centerX = container.offsetWidth / 2;
        const centerY = container.offsetHeight / 2;
        
        bubbles.forEach((bubble, index) => {
            const factor = (index + 1) * 0.02;
            const moveX = (clientX - centerX) * factor;
            const moveY = (clientY - centerY) * factor;
            bubble.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    });

    container.addEventListener('mouseleave', () => {
        bubbles.forEach(bubble => {
            bubble.style.transform = `translate(0, 0)`;
        });
    });
</script>
