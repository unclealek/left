<title>Approaching State - Café Regatta</title>

      margin: 0;

      color: #e5e1ec;
      overflow: hidden;
    }
    .glass-panel {
      background: rgba(19, 18, 26, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(30, 30, 46, 0.5);
    }
    .drift-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.15;
      animation: drift 20s infinite alternate ease-in-out;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, 50px) scale(1.1); }
    }
    .timer-ring {
      transition: stroke 0.5s ease;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>

<body class="bg-surface-container-lowest flex items-center justify-center min-h-screen">
<!-- Atmospheric Background Elements -->
<div class="drift-bg">
<div class="bubble bg-primary w-96 h-96 -top-20 -left-20"></div>
<div class="bubble bg-secondary w-80 h-80 bottom-20 right-10" style="animation-delay: -5s;"></div>
<div class="bubble bg-tertiary w-64 h-64 top-1/2 left-1/3" style="animation-delay: -12s;"></div>
</div>
<!-- Shared TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface/80 backdrop-blur-xl">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">location_on</span>
<span class="font-display-sm text-display-sm font-bold text-primary">Café Regatta</span>
</div>
<button class="hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined text-primary">schedule</span>
</button>
</header>
<!-- Main Interaction Canvas -->
<main class="relative z-10 w-full max-w-md px-margin-mobile flex flex-col items-center justify-center text-center space-y-xl">
<!-- User Focus Section -->
<div class="space-y-sm animate-pulse-slow">
<p class="font-label-md text-label-md text-outline uppercase tracking-[0.2em]">ON YOUR WAY TO</p>
<div class="relative inline-block">
<div class="absolute inset-0 bg-primary blur-3xl opacity-20 rounded-full"></div>
<h1 class="font-display-sm text-display-sm font-bold text-on-surface relative">Kelvin</h1>
</div>
</div>
<!-- Countdown Timer -->
<div class="relative flex items-center justify-center w-40 h-40">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-container-high" cx="80" cy="80" fill="transparent" r="74" stroke="currentColor" stroke-width="4"></circle>
<circle class="timer-ring text-primary transition-all duration-1000 ease-linear" cx="80" cy="80" fill="transparent" id="timer-progress" r="74" stroke="currentColor" stroke-dasharray="465" stroke-dashoffset="0" stroke-width="4"></circle>
</svg>
<div class="absolute flex flex-col items-center">
<span class="font-display-sm text-display-sm font-bold text-on-surface" id="countdown-text">57 SEC</span>
</div>
</div>
<!-- Hint Card Box -->
<div class="glass-panel w-full p-lg rounded-xl flex flex-col items-center space-y-md border-outline-variant/20 shadow-2xl">
<span class="font-label-md text-label-md text-outline uppercase tracking-widest">LOOK FOR</span>
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary scale-125">headphones</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface">Blue headphones</span>
</div>
</div>
<!-- Icebreaker Block -->
<div class="w-full py-md px-lg bg-surface-container-high/40 rounded-xl border-l-4 border-secondary flex flex-col items-start text-left">
<span class="font-label-sm text-label-sm text-secondary font-bold uppercase mb-xs">Icebreaker Idea</span>
<p class="font-body-md text-body-md text-on-surface-variant italic">"I noticed you're a fan of ambient Lo-Fi too. Have you checked out the new playlist for this café yet?"</p>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-md pt-lg">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline-lg-mobile text-headline-lg-mobile hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-primary/20">
        We connected!
      </button>
<button class="font-body-md text-body-md text-outline hover:text-on-surface transition-colors py-sm">
        Cancel
      </button>
</div>
</main>
<!-- Shared BottomNavBar (Suppressed due to transactional focus, but following system logic for non-linear pages) -->
<!-- Note: Suppression logic applied for "Focused Approaching State" to prioritize the immediate action. -->
<script>
    // Timer Logic
    const countdownText = document.getElementById('countdown-text');
    const timerProgress = document.getElementById('timer-progress');
    const totalTime = 60;
    let timeLeft = 57;

    const circumference = 2 * Math.PI * 74;
    timerProgress.style.strokeDasharray = circumference;

    const updateTimer = () => {
      const offset = circumference - (timeLeft / totalTime) * circumference;
      timerProgress.style.strokeDashoffset = offset;
      countdownText.textContent = `${timeLeft} SEC`;

      // Color Shift: Iris -> Amber -> Blush
      if (timeLeft > 30) {
        timerProgress.style.color = '#c6c0ff'; // Iris (Primary)
      } else if (timeLeft > 10) {
        timerProgress.style.color = '#ffb1c1'; // Tertiary/Blush
      } else {
        timerProgress.style.color = '#ffb4ab'; // Error/Salmon Blush
      }

      if (timeLeft > 0) {
        timeLeft--;
      } else {
        clearInterval(timerInterval);
        countdownText.textContent = "NOW";
        timerProgress.classList.add('animate-pulse');
      }
    };

    const timerInterval = setInterval(updateTimer, 1000);
    updateTimer(); // Initial call

    // Micro-interactions
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('touchstart', () => {
        btn.classList.add('scale-95');
      });
      btn.addEventListener('touchend', () => {
        btn.classList.remove('scale-95');
      });
    });
  </script>
</body></html>
