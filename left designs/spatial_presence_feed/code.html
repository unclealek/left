<!-- Expansion Overlay (Placeholder for Interaction) -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-container-padding hidden transition-all duration-500 opacity-0 scale-95" id="expansion-card">
<div class="glass-card w-full max-w-sm rounded-3xl p-8 relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-surface-variant">
<div class="h-full bg-primary-container w-2/3 glow-pulse" style="box-shadow: 0 0 15px #8b80ff"></div>
</div>
<button class="absolute top-4 right-4 text-on-surface-variant hover:text-on-surface" onclick="closeCard()">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex flex-col items-center text-center gap-6">
<div class="w-24 h-24 rounded-full border-4 border-primary/20 p-1">
<img class="w-full h-full object-cover rounded-full" id="modal-img" src=""/>
</div>
<div>
<span class="font-label-mono text-label-mono px-3 py-1 rounded-full bg-surface-container-high text-primary mb-2 inline-block" id="modal-tag"></span>
<h2 class="font-headline-md text-headline-md mt-2">Soft Anonymity</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1 px-4">This presence orb is active and open to spatial resonance. Send a pulse to connect.</p>
</div>
<div class="flex gap-4 w-full">
<button class="flex-1 py-3 px-6 rounded-xl bg-primary text-on-primary font-bold transition-transform active:scale-95">Pulse</button>
<button class="flex-1 py-3 px-6 rounded-xl border border-outline-variant text-on-surface font-bold transition-transform active:scale-95">Dismiss</button>
</div>
</div>
</div>
</div>
<script>
        // Simple Interaction logic
        const orbs = document.querySelectorAll('.group');
        const overlay = document.getElementById('expansion-card');
        const modalImg = document.getElementById('modal-img');
        const modalTag = document.getElementById('modal-tag');

        orbs.forEach(orb => {
            orb.addEventListener('click', () => {
                const img = orb.querySelector('img').src;
                const tag = orb.querySelector('.text-label-mono').innerText;
                
                modalImg.src = img;
                modalTag.innerText = tag;
                
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0', 'scale-95');
                    overlay.classList.add('opacity-100', 'scale-100');
                }, 10);
            });
        });

        function closeCard() {
            overlay.classList.remove('opacity-100', 'scale-100');
            overlay.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        // Space out orbs randomly for more organic feel if needed, 
        // but currently fixed for reliable iPhone-like UI layout.
    </script>
