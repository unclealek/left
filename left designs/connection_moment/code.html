<style>
        body {
            background-color: #12121c;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .pulse-ring {
            position: absolute;
            border: 1px solid rgba(232, 125, 150, 0.3);
            border-radius: 50%;
            animation: pulse-ring-animation 6s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring-animation {
            0% { transform: scale(0.2); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .iris-glow {
            background: radial-gradient(circle, rgba(198, 192, 255, 0.15) 0%, transparent 70%);
        }

        .blush-glow {
            background: radial-gradient(circle, rgba(232, 125, 150, 0.1) 0%, transparent 70%);
        }

        .orb-gradient {
            background: radial-gradient(circle at 30% 30%, #c6c0ff, #2700a1);
        }

        .orb-gradient-blush {
            background: radial-gradient(circle at 30% 30%, #ffb1c1, #7d2841);
        }

        .floating {
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>

<script>
        // Atmospheric interaction: subtle follow-through on profile bubbles
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.floating');
            const x = (e.clientX - window.innerWidth / 2) / 50;
            const y = (e.clientY - window.innerHeight / 2) / 50;
            
            orbs.forEach((orb, index) => {
                const factor = (index + 1) * 0.5;
                orb.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
            });
        });

        // Trigger pulse on button press
        const mainBtn = document.querySelector('button.bg-primary');
        mainBtn.addEventListener('mousedown', () => {
            const rings = document.querySelectorAll('.pulse-ring');
            rings.forEach(ring => {
                ring.style.animationDuration = '1.5s';
                ring.style.borderColor = 'rgba(198, 192, 255, 0.8)';
            });
        });
        mainBtn.addEventListener('mouseup', () => {
            const rings = document.querySelectorAll('.pulse-ring');
            rings.forEach(ring => {
                ring.style.animationDuration = '6s';
                ring.style.borderColor = 'rgba(232, 125, 150, 0.3)';
            });
        });
    </script>
